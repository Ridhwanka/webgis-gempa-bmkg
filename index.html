<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebGIS Gempa BMKG</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ─── CSS VARIABLES ─────────────────────────────────── */
    :root {
      --bg:         #0d1420;
      --bg2:        #151f2e;
      --bg3:        #1a2740;
      --border:     #233047;
      --text:       #d4dce8;
      --text-muted: #56687d;
      --text-dim:   #384f65;
      --accent:     #f97316;
      --accent-dim: rgba(249,115,22,0.15);
      --green:      #22c55e;
      --yellow:     #f59e0b;
      --red:        #ef4444;
      --sidebar-w:  280px;
      --header-h:   52px;
      --statusbar-h: 44px;
      --radius:     8px;
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
      --trans:      0.25s ease;
    }
    [data-theme="light"] {
      --bg:         #f0f4f8;
      --bg2:        #ffffff;
      --bg3:        #e8eef5;
      --border:     #d1dce9;
      --text:       #1e3050;
      --text-muted: #6b80a0;
      --text-dim:   #9fb3cc;
      --accent:     #e8600a;
      --accent-dim: rgba(232,96,10,0.12);
      --shadow:     0 4px 24px rgba(0,0,0,0.12);
    }

    /* ─── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background var(--trans), color var(--trans);
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 0;
      z-index: 1100;
      flex-shrink: 0;
      transition: background var(--trans), border-color var(--trans);
    }

    .header-left {
      display: flex;
      align-items: center;
      height: 100%;
      gap: 0;
    }

    /* Sidebar toggle button */
    #sidebar-toggle {
      height: 100%;
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-muted);
      transition: color var(--trans), background var(--trans);
      flex-shrink: 0;
    }
    #sidebar-toggle:hover { background: var(--bg3); color: var(--accent); }
    #sidebar-toggle svg { width: 18px; height: 18px; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-text .title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo-text .subtitle {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Live indicator */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--text-muted);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* Dark/Light toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .theme-toggle .icon { font-size: 14px; }
    .toggle-pill {
      position: relative;
      width: 40px; height: 22px;
    }
    .toggle-pill input { opacity: 0; width: 0; height: 0; }
    .pill-track {
      position: absolute;
      inset: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background var(--trans);
    }
    .pill-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform var(--trans), background var(--trans);
    }
    input:checked ~ .pill-track { background: var(--accent-dim); border-color: var(--accent); }
    input:checked ~ .pill-thumb { transform: translateX(18px); background: var(--accent); }

    /* ─── BODY AREA ──────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ─── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width var(--trans), opacity var(--trans), border-color var(--trans);
      z-index: 1000;
    }
    .sidebar.collapsed {
      width: 0;
      border-right-width: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* Section headers */
    .sb-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: border-color var(--trans);
    }
    .sb-section-title {
      font-size: 9px;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      padding: 10px 14px 6px;
    }
    .sb-body {
      padding: 6px 14px 12px;
    }

    /* View toggle (Peta / Daftar) */
    .view-switch {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
    }
    .view-btn {
      flex: 1;
      padding: 7px 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
      font-family: 'DM Sans', sans-serif;
    }
    .view-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .view-btn:hover:not(.active) { background: var(--bg3); color: var(--text); }

    /* Scrollable content area */
    .sb-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sb-scroll::-webkit-scrollbar { width: 3px; }
    .sb-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Filter sliders */
    .filter-row {
      margin-bottom: 12px;
    }
    .filter-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .filter-label span {
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #apply-filter {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity var(--trans);
      margin-top: 4px;
    }
    #apply-filter:hover { opacity: 0.85; }

    /* Basemap options */
    .basemap-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .basemap-btn {
      padding: 8px 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all var(--trans);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.3;
    }
    .basemap-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .basemap-btn:hover:not(.active) { color: var(--text); background: var(--bg); }
    .basemap-btn .bm-icon { font-size: 16px; display: block; margin-bottom: 3px; }

    /* Heatmap toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-row-label {
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .toggle-row-label .icon { font-size: 14px; }

    .mini-toggle { position: relative; width: 38px; height: 22px; }
    .mini-toggle input { opacity: 0; width: 0; height: 0; }
    .mini-track {
      position: absolute; inset: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background var(--trans), border-color var(--trans);
    }
    .mini-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform var(--trans), background var(--trans);
    }
    .mini-toggle input:checked ~ .mini-track { background: var(--accent-dim); border-color: var(--accent); }
    .mini-toggle input:checked ~ .mini-thumb { transform: translateX(16px); background: var(--accent); }

    /* Auto refresh control */
    .refresh-label {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .refresh-label span { font-family: 'Space Mono', monospace; color: var(--accent); font-weight: 700; }
    .refresh-progress {
      height: 3px;
      background: var(--bg3);
      border-radius: 3px;
      margin-top: 8px;
    }
    .refresh-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 1s linear;
    }

    /* Gempa list */
    .gempa-list { padding: 8px 8px; }
    .gempa-item {
      background: var(--bg3);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .gempa-item:hover { border-left-color: var(--accent); background: var(--accent-dim); }
    .gempa-item-top { display: flex; justify-content: space-between; align-items: baseline; }
    .gempa-item .mag { font-size: 17px; font-weight: 700; font-family: 'Space Mono', monospace; }
    .gempa-item .depth { font-size: 10px; color: var(--text-dim); }
    .gempa-item .wilayah { font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gempa-item .meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* Magnitude colors */
    .mag-rendah { color: var(--green); }
    .mag-sedang  { color: var(--yellow); }
    .mag-tinggi  { color: var(--red); }

    /* ─── MAP AREA ───────────────────────────────────────── */
    #map {
      flex: 1;
      position: relative;
    }

    /* ─── STATUS BAR (bottom) ────────────────────────────── */
    .status-bar {
      height: var(--statusbar-h);
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 0;
      z-index: 1100;
      flex-shrink: 0;
      transition: background var(--trans), border-color var(--trans);
      overflow: hidden;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px 0 0;
      border-right: 1px solid var(--border);
      margin-right: 16px;
      flex-shrink: 0;
    }
    .stat-pill:last-of-type { border-right: none; margin-right: 0; }
    .stat-pill .sp-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Space Mono', monospace;
    }
    .stat-pill .sp-value {
      font-size: 15px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
    }

    .status-bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .update-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .update-info .upd-label {
      font-size: 10px;
      color: var(--text-muted);
    }
    .update-info .upd-label span {
      font-family: 'Space Mono', monospace;
      color: var(--text);
    }
    .update-info .countdown-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .countdown-row .cd-timer {
      font-family: 'Space Mono', monospace;
      color: var(--accent);
      font-weight: 700;
    }

    .refresh-mini-bar {
      width: 80px;
      height: 3px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }
    .refresh-mini-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 1s linear;
    }

    /* ─── POPUP ──────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }
    .leaflet-popup-tip { background: var(--bg2); }
    .popup-mag { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 6px; font-family: 'Space Mono', monospace; }
    .popup-row { font-size: 12px; color: var(--text-muted); margin: 3px 0; }
    .popup-row strong { color: var(--text); }

    /* ─── LEGEND overlay ────────────────────────────────── */
    .legend {
      position: absolute;
      right: 12px;
      top: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      z-index: 800;
      font-size: 11px;
      pointer-events: none;
    }
    .legend-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      margin-bottom: 7px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ══════════════════════════════════════════ -->
<header>
  <div class="header-left">
    <button id="sidebar-toggle" title="Toggle Sidebar">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/>
      </svg>
    </button>
    <div class="logo">
      <div class="logo-icon">🌏</div>
      <div class="logo-text">
        <span class="title">WebGIS Gempa</span>
        <span class="subtitle">BMKG Indonesia</span>
      </div>
    </div>
  </div>

  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>

    <label class="theme-toggle" title="Ganti tema">
      <span class="icon">🌙</span>
      <div class="toggle-pill">
        <input type="checkbox" id="theme-toggle-input" onchange="toggleTheme(this)"/>
        <div class="pill-track"></div>
        <div class="pill-thumb"></div>
      </div>
      <span class="icon">☀️</span>
    </label>
  </div>
</header>

<!-- ═══ MAIN AREA ════════════════════════════════════════ -->
<div class="main">

  <!-- ─── SIDEBAR ──────────────────────────────────────── -->
  <div class="sidebar" id="sidebar">

    <!-- View Switch -->
    <div class="view-switch">
      <button class="view-btn active" id="btn-peta" onclick="setView('peta')">🗺️ Peta</button>
      <button class="view-btn" id="btn-daftar" onclick="setView('daftar')">📋 Daftar Gempa</button>
    </div>

    <!-- Scrollable content -->
    <div class="sb-scroll">

      <!-- View: Peta (Filter + Basemap + Heatmap) -->
      <div id="view-peta">

        <!-- Filter -->
        <div class="sb-section">
          <div class="sb-section-title">🔍 Filter Magnitudo</div>
          <div class="sb-body">
            <div class="filter-row">
              <div class="filter-label">
                Minimum <span id="min-mag-val">0</span>
              </div>
              <input type="range" id="min-mag" min="0" max="9" step="0.5" value="0"
                oninput="document.getElementById('min-mag-val').textContent=this.value"/>
            </div>
            <div class="filter-row">
              <div class="filter-label">
                Maksimum <span id="max-mag-val">9</span>
              </div>
              <input type="range" id="max-mag" min="0" max="9" step="0.5" value="9"
                oninput="document.getElementById('max-mag-val').textContent=this.value"/>
            </div>
            <button id="apply-filter">Terapkan Filter</button>
          </div>
        </div>

        <!-- Basemap -->
        <div class="sb-section">
          <div class="sb-section-title">🗾 Basemap</div>
          <div class="sb-body">
            <div class="basemap-grid">
              <button class="basemap-btn active" onclick="switchBasemap('dark', this)">
                <span class="bm-icon">🌑</span>Dark
              </button>
              <button class="basemap-btn" onclick="switchBasemap('light', this)">
                <span class="bm-icon">🌤️</span>Light
              </button>
              <button class="basemap-btn" onclick="switchBasemap('satellite', this)">
                <span class="bm-icon">🛰️</span>Satelit
              </button>
              <button class="basemap-btn" onclick="switchBasemap('topo', this)">
                <span class="bm-icon">🏔️</span>Topografi
              </button>
              <button class="basemap-btn" onclick="switchBasemap('osm', this)">
                <span class="bm-icon">🗺️</span>OpenStreetMap
              </button>
              <button class="basemap-btn" onclick="switchBasemap('terrain', this)">
                <span class="bm-icon">🌿</span>Terrain
              </button>
            </div>
          </div>
        </div>

        <!-- Layer toggles -->
        <div class="sb-section">
          <div class="sb-section-title">🔧 Layer</div>
          <div class="sb-body">
            <div class="toggle-row">
              <span class="toggle-row-label">
                <span class="icon">🌡️</span> Heatmap
              </span>
              <label class="mini-toggle">
                <input type="checkbox" id="heatmap-toggle"/>
                <div class="mini-track"></div>
                <div class="mini-thumb"></div>
              </label>
            </div>

            <!-- Auto refresh interval -->
            <div style="margin-top: 10px;">
              <div class="refresh-label">
                ⏱ Auto-refresh interval
                <span id="refresh-interval-val">5 mnt</span>
              </div>
              <input type="range" id="refresh-interval" min="1" max="30" step="1" value="5"
                oninput="onRefreshIntervalChange(this.value)"/>
            </div>
          </div>
        </div>

      </div>

      <!-- View: Daftar Gempa -->
      <div id="view-daftar" style="display:none;">
        <div class="gempa-list" id="gempa-list"></div>
      </div>

    </div><!-- /sb-scroll -->
  </div><!-- /sidebar -->

  <!-- ─── MAP ──────────────────────────────────────────── -->
  <div id="map">
    <!-- Legend overlay -->
    <div class="legend">
      <div class="legend-title">Magnitudo</div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--red)"></div>
        ≥ 6.0 (Tinggi)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--yellow)"></div>
        4.5 – 5.9 (Sedang)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--green)"></div>
        &lt; 4.5 (Rendah)
      </div>
    </div>
  </div>

</div><!-- /main -->

<!-- ═══ STATUS BAR (bottom) ══════════════════════════════ -->
<div class="status-bar">
  <div class="stat-pill">
    <div class="sp-label">Total</div>
    <div class="sp-value" id="stat-total">–</div>
  </div>
  <div class="stat-pill">
    <div class="sp-label">Maks M</div>
    <div class="sp-value" id="stat-max">–</div>
  </div>
  <div class="stat-pill">
    <div class="sp-label">Min M</div>
    <div class="sp-value" id="stat-min">–</div>
  </div>
  <div class="stat-pill">
    <div class="sp-label">Rata²</div>
    <div class="sp-value" id="stat-avg">–</div>
  </div>

  <div class="status-bar-right">
    <div class="refresh-mini-bar">
      <div class="refresh-mini-fill" id="refresh-bar" style="width:100%"></div>
    </div>
    <div class="update-info">
      <div class="upd-label">Update: <span id="last-updated">Memuat...</span></div>
      <div class="countdown-row">
        Refresh dalam <span class="cd-timer" id="countdown-badge">–</span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SCRIPTS ══════════════════════════════════════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
// ── Sidebar toggle ───────────────────────────────────────
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
  setTimeout(() => map.invalidateSize(), 300);
});

// ── Theme toggle ─────────────────────────────────────────
function toggleTheme(el) {
  document.documentElement.setAttribute('data-theme', el.checked ? 'light' : 'dark');
  // update basemap jika perlu
}

// ── View switch (Peta / Daftar) ──────────────────────────
function setView(view) {
  document.getElementById('view-peta').style.display   = view === 'peta'   ? 'block' : 'none';
  document.getElementById('view-daftar').style.display = view === 'daftar' ? 'block' : 'none';
  document.getElementById('btn-peta').classList.toggle('active', view === 'peta');
  document.getElementById('btn-daftar').classList.toggle('active', view === 'daftar');
}

// ── Basemap ──────────────────────────────────────────────
const BASEMAPS = {
  dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light:     'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  topo:      'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
  osm:       'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  terrain:   'https://stamen-tiles-{s}.a.ssl.fastly.net/terrain/{z}/{x}/{y}.png',
};
let currentBaseTile = null;

function switchBasemap(key, btn) {
  if (currentBaseTile) map.removeLayer(currentBaseTile);
  currentBaseTile = L.tileLayer(BASEMAPS[key], {
    attribution: '© CartoDB / OSM / ESRI',
    maxZoom: 18
  }).addTo(map);
  currentBaseTile.bringToBack();
  document.querySelectorAll('.basemap-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Peta ─────────────────────────────────────────────────
const map = L.map('map', { center: [-2.5, 118], zoom: 5, zoomControl: true });

// Default dark basemap
currentBaseTile = L.tileLayer(BASEMAPS.dark, {
  attribution: '© CartoDB © OpenStreetMap', maxZoom: 18
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);
let heatLayer    = null;
let currentData  = [];

// ── Helpers ───────────────────────────────────────────────
function getColor(mag) {
  if (mag >= 6)   return '#ef4444';
  if (mag >= 4.5) return '#f59e0b';
  return '#22c55e';
}
function getMagClass(mag) {
  if (mag >= 6)   return 'mag-tinggi';
  if (mag >= 4.5) return 'mag-sedang';
  return 'mag-rendah';
}
function makeCircle(mag) {
  return {
    radius: Math.max(6, mag * 4.5),
    fillColor: getColor(mag),
    color: '#fff',
    weight: 1.5,
    opacity: 0.9,
    fillOpacity: 0.7
  };
}

// ── Render ────────────────────────────────────────────────
function renderData(features) {
  markersLayer.clearLayers();
  document.getElementById('gempa-list').innerHTML = '';
  currentData = features;

  const heatPoints = [];

  features.forEach(f => {
    const p = f.properties;
    const [lon, lat] = f.geometry.coordinates;
    const mag = p.magnitude;

    heatPoints.push([lat, lon, mag / 9]);

    const circle = L.circleMarker([lat, lon], makeCircle(mag));
    circle.bindPopup(`
      <div class="popup-mag ${getMagClass(mag)}">M ${mag}</div>
      <div class="popup-row">📍 <strong>${p.wilayah}</strong></div>
      <div class="popup-row">📅 ${p.tanggal} — ${p.jam}</div>
      <div class="popup-row">⬇️ Kedalaman: <strong>${p.kedalaman}</strong></div>
      <div class="popup-row">⚠️ Potensi: <strong>${p.potensi || 'Tidak ada info'}</strong></div>
      <div class="popup-row">🫨 Dirasakan: <strong>${p.dirasakan || '-'}</strong></div>
    `, { maxWidth: 250 });
    markersLayer.addLayer(circle);

    // Daftar item
    const item = document.createElement('div');
    item.className = 'gempa-item';
    item.innerHTML = `
      <div class="gempa-item-top">
        <span class="mag ${getMagClass(mag)}">M ${mag}</span>
        <span class="depth">${p.kedalaman}</span>
      </div>
      <div class="wilayah">${p.wilayah}</div>
      <div class="meta">${p.tanggal} · ${p.jam}</div>
    `;
    item.addEventListener('click', () => {
      setView('peta');
      map.flyTo([lat, lon], 8, { duration: 1.2 });
      circle.openPopup();
    });
    document.getElementById('gempa-list').appendChild(item);
  });

  updateHeatmap(heatPoints);
}

// ── Heatmap ───────────────────────────────────────────────
function updateHeatmap(points) {
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
  if (document.getElementById('heatmap-toggle').checked) {
    heatLayer = L.heatLayer(points, {
      radius: 30, blur: 20, maxZoom: 10,
      gradient: { 0.3: '#22c55e', 0.6: '#f59e0b', 1.0: '#ef4444' }
    }).addTo(map);
    markersLayer.clearLayers();
  }
}

document.getElementById('heatmap-toggle').addEventListener('change', function() {
  const heatPoints = currentData.map(f => {
    const [lon, lat] = f.geometry.coordinates;
    return [lat, lon, f.properties.magnitude / 9];
  });

  if (this.checked) {
    markersLayer.clearLayers();
    heatLayer = L.heatLayer(heatPoints, {
      radius: 30, blur: 20, maxZoom: 10,
      gradient: { 0.3: '#22c55e', 0.6: '#f59e0b', 1.0: '#ef4444' }
    }).addTo(map);
  } else {
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
    currentData.forEach(f => {
      const p = f.properties;
      const [lon, lat] = f.geometry.coordinates;
      const circle = L.circleMarker([lat, lon], makeCircle(p.magnitude));
      circle.bindPopup(`
        <div class="popup-mag ${getMagClass(p.magnitude)}">M ${p.magnitude}</div>
        <div class="popup-row">📍 <strong>${p.wilayah}</strong></div>
        <div class="popup-row">📅 ${p.tanggal} — ${p.jam}</div>
        <div class="popup-row">⬇️ Kedalaman: <strong>${p.kedalaman}</strong></div>
        <div class="popup-row">⚠️ Potensi: <strong>${p.potensi || 'Tidak ada info'}</strong></div>
        <div class="popup-row">🫨 Dirasakan: <strong>${p.dirasakan || '-'}</strong></div>
      `, { maxWidth: 250 });
      markersLayer.addLayer(circle);
    });
  }
});

// ── Fetch data ────────────────────────────────────────────
async function loadGempa(minMag = 0, maxMag = 10) {
  try {
    const res = await fetch(
      `https://web-production-567fb.up.railway.app/api/gempa?min_mag=${minMag}&max_mag=${maxMag}`
    );
    const geojson = await res.json();
    renderData(geojson.features);
    document.getElementById('last-updated').textContent =
      new Date().toLocaleTimeString('id-ID');
  } catch(e) {
    document.getElementById('last-updated').textContent = 'Gagal';
  }
}

async function loadStats() {
  try {
    const res  = await fetch('https://web-production-567fb.up.railway.app/api/stats');
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total_gempa;
    document.getElementById('stat-max').textContent   = data.magnitude_max;
    document.getElementById('stat-min').textContent   = data.magnitude_min;
    document.getElementById('stat-avg').textContent   = data.magnitude_rata_rata;
  } catch(e) {}
}

// ── Auto Refresh ──────────────────────────────────────────
let refreshIntervalMinutes = 5;
let secondsLeft = refreshIntervalMinutes * 60;
let refreshTimer   = null;
let countdownTimer = null;

function startAutoRefresh() {
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  secondsLeft = refreshIntervalMinutes * 60;

  async function doRefresh() {
    try { await fetch('https://web-production-567fb.up.railway.app/api/fetch-bmkg'); } catch(e) {}
    const minMag = document.getElementById('min-mag').value;
    const maxMag = document.getElementById('max-mag').value;
    await loadGempa(minMag, maxMag);
    await loadStats();
    secondsLeft = refreshIntervalMinutes * 60;
  }

  refreshTimer = setInterval(doRefresh, refreshIntervalMinutes * 60 * 1000);

  countdownTimer = setInterval(() => {
    secondsLeft--;
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    document.getElementById('countdown-badge').textContent =
      `${m}:${s.toString().padStart(2,'0')}`;
    const pct = (secondsLeft / (refreshIntervalMinutes * 60)) * 100;
    document.getElementById('refresh-bar').style.width = pct + '%';
    if (secondsLeft <= 0) secondsLeft = refreshIntervalMinutes * 60;
  }, 1000);
}

function onRefreshIntervalChange(val) {
  refreshIntervalMinutes = parseInt(val);
  document.getElementById('refresh-interval-val').textContent = val + ' mnt';
  startAutoRefresh();
}

// ── Filter ────────────────────────────────────────────────
document.getElementById('apply-filter').addEventListener('click', () => {
  const minMag = document.getElementById('min-mag').value;
  const maxMag = document.getElementById('max-mag').value;
  loadGempa(minMag, maxMag);
});

// ── Init ──────────────────────────────────────────────────
loadStats();
loadGempa();
startAutoRefresh();
</script>
</body>
</html>
